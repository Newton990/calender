<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLuna | Loading...</title>
    <meta name="description" content="NewLuna â€” Your premium cycle & wellness companion.">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #fff8fb, #fce4ec);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif;
        }
        .luna-mark {
            font-size: 5rem;
            animation: spin 3s cubic-bezier(.175,.885,.32,1.275) infinite;
        }
        .luna-title {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem; font-weight: 700;
            background: linear-gradient(135deg, #f06292, #ce4993);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .luna-subtitle {
            margin-top: 10px; color: #9e7d8a;
            font-size: 1rem; letter-spacing: .5px;
        }
        .dots { margin-top: 24px; display: flex; gap: 8px; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #f06292; opacity: .3;
            animation: blink 1.2s ease infinite;
        }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
        @keyframes spin {
            0%   { transform: rotate(0deg) scale(1); }
            50%  { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
    
    
    
    
    

    <!-- App Icons and Favicon -->
    <link rel="icon" href="NewLuna_Logo_Transparent.svg" type="image/svg+xml">
    <meta property="og:image" content="NewLuna_Logo_Light.svg">
    <meta name="twitter:image" content="NewLuna_Logo_Light.svg">
</head>
<body>
    <div class="luna-mark">â‹</div>
    <div class="luna-title">NewLuna</div>
    <div class="luna-subtitle">Your wellness, beautifully tracked</div>
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script>
        // This page acts as the entry router.
        // Firebase common.js handles auth and redirects.
        // If Firebase isn't available yet, fall back to session check.
        window.addEventListener('load', () => {
            // FORCED BYPASS FOR LOCAL TESTING
            localStorage.setItem('NewLunaSession', 'testuser@localhost');
            
            setTimeout(() => {
                // Fallback: if common.js hasn't redirected yet after 2.5s
                const user = localStorage.getItem('NewLunaSession');
                if (user) {
                    const layout = localStorage.getItem('current_layout') || 'soft';
                    if (layout === 'roma') {
                        window.location.replace('dashboard.html');
                    } else {
                        window.location.replace('soft_dashboard.html');
                    }
                } else {
                    window.location.replace('login.html');
                }
            }, 500); // reduced timeout to speed up loading
        });
    </script>

    <script src="js/common.js"></script>
</body>
</html>
