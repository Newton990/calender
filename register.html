<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Luna | Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d6d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script type="module">
        try {
            import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
            import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

            // Firebase config - REPLACE WITH YOUR ACTUAL FIREBASE CONFIG
            const firebaseConfig = {
                apiKey: "your-actual-api-key",
                authDomain: "your-project.firebaseapp.com",
                projectId: "your-project-id",
                storageBucket: "your-project.appspot.com",
                messagingSenderId: "123456789",
                appId: "your-app-id"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            window.firebaseAuth = auth;
            window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
            window.sendEmailVerification = sendEmailVerification;
        } catch (error) {
            console.error('Firebase initialization failed:', error);
            alert('Firebase is not configured. Please replace the placeholder config with your actual Firebase project config.');
        }
    </script>
    <script src="js/common.js"></script>
</head>
<body>
    <!-- Animated Splash Screen -->
    <div class="splash-overlay">
        <div class="splash-content">
            <div class="splash-flower">❋</div>
            <div class="splash-text">New Luna</div>
        </div>
    </div>

    <div id="auth-container" class="auth-wrapper">
        <div class="auth-card glass">
            <h1 class="logo auth-title moon-bloom-logo">❋ New Luna</h1>
            <p class="auth-subtitle">Join our elegant health community.</p>
            
            <div id="signup-form-container">
                <h2>Create Account</h2>
                <input type="email" id="signup-email" class="auth-input" placeholder="Enter your Email">
                
                <select id="auth-method" class="auth-input" onchange="toggleAuthInput()">
                    <option value="password">Password</option>
                    <option value="pin">PIN (4 digits)</option>
                    <option value="pattern">Pattern</option>
                    <option value="fingerprint">Fingerprint</option>
                </select>
                
                <div id="password-input">
                    <input type="password" id="signup-password" class="auth-input" placeholder="Create a Password">
                </div>
                
                <div id="pin-input" style="display: none;">
                    <input type="password" id="signup-pin" class="auth-input" placeholder="Enter 4-digit PIN" maxlength="4" pattern="[0-9]{4}">
                </div>
                
                <div id="pattern-input" style="display: none;">
                    <canvas id="pattern-canvas" width="200" height="200" style="border: 1px solid #ccc; margin: 10px auto; display: block;"></canvas>
                    <button type="button" id="clear-pattern" class="btn" style="width: 100%; margin-top: 10px;">Clear Pattern</button>
                </div>
                
                <div id="fingerprint-input" style="display: none;">
                    <p>Touch the fingerprint sensor or use your device's biometric authentication.</p>
                    <button type="button" id="setup-fingerprint" class="btn" style="width: 100%; margin-top: 10px;">Setup Fingerprint</button>
                </div>
                
                <button id="signup-btn" class="btn-primary auth-btn">Sign Up</button>
                <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
            </div>
            
            <p id="auth-error" class="auth-error hidden">Invalid credentials</p>
        </div>
    </div>
    <script src="js/auth.js"></script>    <script>
        function toggleAuthInput() {
            const method = document.getElementById('auth-method').value;
            document.getElementById('password-input').style.display = method === 'password' ? 'block' : 'none';
            document.getElementById('pin-input').style.display = method === 'pin' ? 'block' : 'none';
            document.getElementById('pattern-input').style.display = method === 'pattern' ? 'block' : 'none';
            document.getElementById('fingerprint-input').style.display = method === 'fingerprint' ? 'block' : 'none';
        }

        // Pattern drawing
        let patternCanvas = null;
        let patternCtx = null;
        let isDrawing = false;
        let pattern = [];

        function initPattern() {
            patternCanvas = document.getElementById('pattern-canvas');
            if (patternCanvas) {
                patternCtx = patternCanvas.getContext('2d');
                patternCtx.strokeStyle = '#ff4d6d';
                patternCtx.lineWidth = 4;
                patternCtx.lineCap = 'round';

                patternCanvas.addEventListener('mousedown', startDrawing);
                patternCanvas.addEventListener('mousemove', draw);
                patternCanvas.addEventListener('mouseup', stopDrawing);
                patternCanvas.addEventListener('mouseout', stopDrawing);

                // Touch events for mobile
                patternCanvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startDrawing(e.touches[0]);
                });
                patternCanvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    draw(e.touches[0]);
                });
                patternCanvas.addEventListener('touchend', stopDrawing);
            }
        }

        let pattern = [];

        function startDrawing(e) {
            isDrawing = true;
            const rect = patternCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            patternCtx.beginPath();
            patternCtx.moveTo(x, y);
            pattern.push({x, y});
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = patternCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            patternCtx.lineTo(x, y);
            patternCtx.stroke();
            pattern.push({x, y});
        }

        function stopDrawing() {
            isDrawing = false;
            patternCtx.closePath();
            window.pattern = pattern; // Store globally
        }

        document.getElementById('clear-pattern').addEventListener('click', () => {
            patternCtx.clearRect(0, 0, patternCanvas.width, patternCanvas.height);
            pattern = [];
        });

        // Fingerprint setup
        document.getElementById('setup-fingerprint').addEventListener('click', async () => {
            if ('credentials' in navigator) {
                try {
                    const credential = await navigator.credentials.create({
                        publicKey: {
                            challenge: new Uint8Array(32),
                            rp: { name: 'New Luna' },
                            user: { id: new Uint8Array(16), name: 'user@example.com', displayName: 'User' },
                            pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
                            authenticatorSelection: { authenticatorAttachment: 'platform' },
                            timeout: 60000,
                        }
                    });
                    alert('Fingerprint setup successful!');
                    // Store credential for later use
                    localStorage.setItem('fingerprintCredential', JSON.stringify(credential));
                } catch (error) {
                    alert('Fingerprint setup failed: ' + error.message);
                }
            } else {
                alert('WebAuthn not supported on this device.');
            }
        });

        // Initialize pattern on load
        document.addEventListener('DOMContentLoaded', initPattern);
    </script></body>
</html>
