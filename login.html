<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLuna | Welcome</title>
    <meta name="description" content="Sign in to NewLuna â€” your premium cycle & wellness companion.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background-color: #fff8fb;
            position: relative;
            overflow: hidden;
        }

        /* â”€â”€ DYNAMIC BACKGROUND â”€â”€ */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-color: #fff8fb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(339, 81%, 74%, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(225, 39%, 30%, 0.05) 0, transparent 50%);
        }

        .blob-1 { top: -10%; left: -10%; background: linear-gradient(135deg, rgba(255, 179, 193, 0.3), rgba(157, 78, 221, 0.15)); }
        .blob-2 { bottom: -15%; right: -10%; background: linear-gradient(135deg, rgba(67, 170, 139, 0.1), rgba(76, 201, 240, 0.2)); animation-delay: -5s; }

        /* â”€â”€ AUTH CARD â”€â”€ */
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 48px;
            margin: 20px;
            animation: cardEntrance 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-flower {
            font-size: 2.8rem;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            animation: flowerBloom 1.2s ease-out;
        }

        @keyframes flowerBloom {
            0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        /* â”€â”€ FORM ELEMENTS â”€â”€ */
        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 179, 193, 0.15);
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f06292, #ce4993);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(240, 98, 146, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(240, 98, 146, 0.5);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px;
            background: rgba(0,0,0,0.06);
        }
        .auth-divider span { padding: 0 15px; }

        /* â”€â”€ SOCIAL BUTTONS â”€â”€ */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: white;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all .2s;
            cursor: pointer;
        }

        .btn-social:hover {
            background: #fdfdfd;
            border-color: rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }

        .btn-social img { width: 18px; height: 18px; }

        .footer-link {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .error-msg {
            background: #fff0f4;
            color: #c0185a;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border: 1px solid rgba(192, 24, 90, 0.1);
        }

        /* View Toggling */
        .auth-view { display: none; }
        .auth-view.active { display: block; animation: fadeIn .4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
    
    
    
    
    

    <!-- App Icons and Favicon -->
    <link rel="icon" href="NewLuna_Logo_Transparent.svg" type="image/svg+xml">
    <meta property="og:image" content="NewLuna_Logo_Light.svg">
    <meta name="twitter:image" content="NewLuna_Logo_Light.svg">
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="animated-blob blob-1"></div>
    <div class="animated-blob blob-2"></div>

    <div class="auth-card glass-premium">
        
        <div class="brand-header">
            <span class="brand-flower">â‹</span>
            <h1 class="brand-name">NewLuna</h1>
            <p id="auth-subtitle" class="subtitle">Your wellness journey continues here.</p>
        </div>

        <div id="auth-error" class="error-msg"></div>

        <!-- LOGIN VIEW -->
        <div id="view-login" class="auth-view">
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="login-email" class="form-input" placeholder="e.g. sarah@example.com">
            </div>
            
            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" id="login-password" class="form-input" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
            </div>

            <button id="login-btn" class="btn-auth btn-primary btn-premium">Sign In âœ¨</button>

            <div class="auth-divider"><span>or continue with</span></div>

            <div class="social-grid">
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                    Google
                </button>
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="Apple">
                    Apple
                </button>
            </div>

            <div class="footer-link">
                Don't have an account? <a href="#" id="show-signup">Sign Up</a>
            </div>
        </div>

        <!-- SIGNUP VIEW -->
        <div id="view-signup" class="auth-view active">
            <div class="form-group">
                <label class="label">First Name</label>
                <input type="text" id="signup-nickname" class="form-input" placeholder="e.g. Sarah">
            </div>

            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="signup-email" class="form-input" placeholder="e.g. sarah@example.com">
            </div>
            
            <div class="form-group">
                <label class="label">Create Password</label>
                <input type="password" id="signup-password" class="form-input" placeholder="Min. 6 characters">
            </div>

            <button id="signup-btn" class="btn-auth btn-primary btn-premium">Create Account âœ¨</button>

            <div class="auth-divider"><span>or join with</span></div>

            <div class="social-grid">
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                    Google
                </button>
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="Apple">
                    Apple
                </button>
            </div>

            <div class="footer-link">
                Already have an account? <a href="#" id="show-login">Sign In</a>
            </div>
        </div>

    </div>

    <script>
        // Handled by js/auth.js
    </script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>

</body>
</html>
