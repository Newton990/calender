<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLuna | AI Assistant (Soft)</title>
    <link rel="stylesheet" href="soft-style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f06292">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="js/common.js"></script>
    <style>
        .chat-container {
            height: calc(100vh - 280px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 80px 20px 20px;
            overflow-y: auto;
            padding-bottom: 180px;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: softSlide 0.4s ease;
        }
        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #4a4a4a;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #f3a8b8, #e57373);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(243, 168, 184, 0.3);
        }
        .soft-input-bar {
            position: fixed;
            bottom: 75px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        .mood-reflection {
            display: flex;
            gap: 8px;
            padding: 5px 0 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .mood-dot {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 50%;
            font-size: 1.1rem; cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .mood-dot:hover { transform: scale(1.2); background: #fdf2f4; }
        
        .input-row { display: flex; gap: 10px; align-items: center; }
        #soft-chat-input {
            flex: 1; background: none; border: none; outline: none;
            font-family: inherit; font-size: 0.95rem; color: #4a4a4a;
        }
        .mini-send-btn {
            background: #f3a8b8; color: white; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .mini-send-btn:hover { transform: rotate(15deg) scale(1.1); box-shadow: 0 4px 12px rgba(243, 168, 184, 0.4); }

        @keyframes softSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="soft-theme">
    <!-- Animated Splash Screen -->
    <div class="splash-overlay">
        <div class="splash-flower">❋</div>
        <div class="splash-bloom">New Luna</div>
    </div>
    <div class="fluid-container">
        <!-- Soft Header -->
        <header class="soft-header">
            <button class="icon-btn" onclick="history.back()">←</button>
            <div class="header-content">
                <span class="soft-tag">AI Companion</span>
                <h1 style="font-size: 1.3rem; margin-top: 4px;">Talk to Luna 🌙</h1>
            </div>
            <div class="user-avatar-mini" style="background-image: url('https://api.placeholder.com/40');"></div>
        </header>

        <!-- Chat thread -->
        <div class="chat-container" id="soft-chat-thread">
            <div class="message ai">
                Hi! I'm Luna, your personal wellness companion. 🌙<br><br>Tell me how you're feeling today — physically, emotionally, anything. I'm here to listen and help. ✨
            </div>
        </div>

        <!-- Suggestion Chips -->
        <div class="insights-row" style="position: fixed; bottom: 185px; left: 0; right: 0; padding: 0 20px; z-index: 999;">
            <div class="insight-pill" style="white-space: nowrap; font-size: 0.8rem; background: rgba(255,255,255,0.7);">Why am I so tired? 😴</div>
            <div class="insight-pill" style="white-space: nowrap; font-size: 0.8rem; background: rgba(255,255,255,0.7);">Cramps relief? 🌿</div>
            <div class="insight-pill" style="white-space: nowrap; font-size: 0.8rem; background: rgba(255,255,255,0.7);">I feel happy! 😊</div>
        </div>

        <!-- Soft Input Bar -->
        <div class="soft-input-bar">
            <div class="mood-reflection" id="soft-mood-row">
                <div class="mood-dot" title="Happy">😊</div>
                <div class="mood-dot" title="Tired">😴</div>
                <div class="mood-dot" title="Anxious">😟</div>
                <div class="mood-dot" title="Sad">😢</div>
                <div class="mood-dot" title="Cramping">😣</div>
                <div class="mood-dot" title="Energetic">⚡</div>
            </div>
            <div class="input-row">
                <button style="background:none; border:none; font-size: 1.3rem; opacity: 0.5;">🎤</button>
                <input type="text" id="soft-chat-input" placeholder="How are you feeling, dear?">
                <button class="mini-send-btn" id="soft-send-btn">✨</button>
            </div>
        </div>

        <!-- Soft Bottom Nav -->
        <nav class="soft-nav">
            <a href="soft_dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="calendar.html" class="nav-item">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Dates</span>
            </a>
            <a href="soft_assistant.html" class="nav-item active">
                <span class="nav-icon">🌙</span>
                <span class="nav-label">Luna</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script src="js/soft_assistant.js"></script>
    <script>
        // Layout Guard: Ensure we're in the right variant
        window.addEventListener('load', () => {
             const layout = localStorage.getItem('current_layout') || 'roma';
             if (layout === 'roma') window.location.href = 'assistant.html';
        });
    </script>
</body>
</html>
