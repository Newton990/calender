<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey | Luna Soft</title>
    <link rel="stylesheet" href="css/soft-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint-primary: #80CBC4;
            --mint-light: #E0F2F1;
            --mint-gradient: linear-gradient(135deg, #B2DFDB 0%, #80CBC4 100%);
        }
        
        body {
            background-color: #FDF7F9;
            color: #2D3142;
        }

        .pregnancy-header {
            padding: 40px 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .milestone-ring-container {
            display: flex;
            justify-content: center;
            padding: 40px 0;
            position: relative;
        }

        .milestone-ring {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(128, 203, 196, 0.15);
            border: 8px solid var(--mint-light);
            position: relative;
        }

        .milestone-ring::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 8px solid var(--mint-primary);
            clip-path: polygon(50% 50%, -50% -50%, 150% -50%); /* Dynamic clip in JS */
            transform: rotate(-90deg);
        }

        .week-number {
            font-size: 56px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: #2D3142;
            line-height: 1;
        }

        .week-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .baby-size-pill {
            background: var(--mint-light);
            color: #00796B;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 24px;
        }

        .insight-card {
            background: var(--mint-gradient);
            color: white;
            padding: 24px;
            border-radius: 32px;
            margin: 24px;
            box-shadow: 0 15px 30px rgba(128, 203, 196, 0.3);
        }

        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 72px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .nav-item {
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A0A0A0;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--mint-primary);
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body>
    <!-- Animated Splash Screen -->
    <div class="splash-overlay">
        <div class="splash-flower">❋</div>
        <div class="splash-bloom">New Luna</div>
    </div>

    <div class="pregnancy-header">
        <div>
            <div class="glass-pill" style="background: rgba(128, 203, 196, 0.1); color: #00796B; margin-bottom: 8px;">
                <span style="color: #00796B; margin-right: 6px;">●</span> Pregnancy Journey
            </div>
            <h1 style="font-family: 'Outfit'; font-size: 32px; font-weight: 700; margin: 0;">The Journey ✨</h1>
        </div>
        <div class="profile-shimmer"></div>
    </div>

    <div class="milestone-ring-container">
        <div class="milestone-ring" id="progressRing">
            <span class="week-label">Week</span>
            <span class="week-number" id="weekDisplay">12</span>
            <span class="week-label" style="font-size: 11px; margin-top: 8px;" id="dayDisplay">Day 3</span>
        </div>
    </div>

    <div style="display: flex; justify-content: center;">
        <div class="baby-size-pill" id="sizePill">
            Baby is the size of a Plum 🫐
        </div>
    </div>

    <div class="insight-card">
        <div style="display: flex; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 24px; margin-right: 12px;">💡</span>
            <h3 style="margin: 0; font-family: 'Outfit'; font-size: 18px;">Today's Insight</h3>
        </div>
        <p style="margin: 0; font-size: 15px; line-height: 1.6; opacity: 0.9;" id="insightText">
            You might be feeling a burst of energy! This is common in the second trimester. Use it to tackle small tasks or enjoy a light walk.
        </p>
    </div>

    <div class="status-grid">
        <div class="glass-card" style="padding: 20px;">
            <div style="color: #888; font-size: 12px; font-weight: 600; margin-bottom: 8px;">SYMPTOMS</div>
            <div style="font-weight: 700; font-size: 18px;" id="symptomText">Mild Fatigue</div>
        </div>
        <div class="glass-card" style="padding: 20px;">
            <div style="color: #888; font-size: 12px; font-weight: 600; margin-bottom: 8px;">KICK COUNT</div>
            <div style="font-weight: 700; font-size: 18px;" id="kickText">Not yet active</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='soft_dashboard.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        <div class="nav-item" onclick="location.href='soft_assistant.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </nav>

    <script src="js/soft_pregnancy.js"></script>
</body>
</html>
