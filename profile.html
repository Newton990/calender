<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Luna | My Profile</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ff4d6d">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="js/common.js"></script>
</head>
<body>
    <!-- Animated Splash Screen -->
    <div class="splash-overlay">
        <div class="splash-content">
            <div class="splash-flower">❋</div>
            <div class="splash-text">New Luna</div>
        </div>
    </div>

    <div id="global-header"></div>
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="calendar.html" class="nav-item">
            <span class="nav-icon">📅</span>
            <span>Calendar</span>
        </a>
        <div id="quick-log-btn" class="log-btn-nav" title="Quick Log">+</div>
        <a href="report.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Insights</span>
        </a>
        <a href="settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </a>
    </nav>
    <div id="app-container" class="app-container" style="align-items: center; padding-top: 5vh;">
        <div class="glass" style="padding: 40px; max-width: 500px; width: 100%; text-align: center;">
            <h2 class="auth-title" style="font-family: 'Playfair Display', serif; color: var(--primary-dark);">👤 My Profile</h2>
            <p class="auth-subtitle">Update your personal details below.</p>
            
            <div class="setup-form" style="text-align: left; padding: 20px 0;">
                <label style="font-weight: 600; display: block; margin-bottom: 5px;">Display Name</label>
                <input type="text" id="profile-name" class="date-input" placeholder="e.g. Luna" style="margin-top:0; margin-bottom: 15px;">
                
                <label style="font-weight: 600; display: block; margin-bottom: 5px;">Age</label>
                <input type="number" id="profile-age" class="date-input" placeholder="Your age" style="margin-top:0; margin-bottom: 15px;">
                
                <label style="font-weight: 600; display: block; margin-bottom: 5px;">Primary Goal</label>
                <select id="profile-goal" class="date-input" style="margin-top:0; background: white;">
                    <option value="track">Track Period & Health</option>
                    <option value="conceive">Trying to Conceive</option>
                    <option value="pregnant">Currently Pregnant</option>
                </select>
            </div>
            
            <div class="modal-actions" style="margin-top: 10px;">
                <a href="index.html" class="btn-secondary" style="text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box;">Cancel</a>
                <button id="save-profile" class="btn-primary">Save Profile</button>
            </div>
        </div>
    </div>
    <script src="js/profile.js"></script>
</body>
</html>
