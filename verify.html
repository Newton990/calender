<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLuna | Verify Email</title>
    <meta name="description" content="NewLuna â€” Your premium cycle tracking and wellness companion.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <style>
        :root {
            --bloom-pink: #f06292;
            --bloom-light: #f8a5c2;
            --bloom-pale: #fce4ec;
            --bg: #f9eef3;
            --card: #ffffff;
            --text: #3d2c35;
            --muted: #9e7d8a;
            --border: rgba(240, 98, 146, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--card); border-radius: 32px;
            padding: 48px 40px; box-shadow: 0 12px 48px rgba(240, 98, 146, 0.15);
            max-width: 450px; width: 100%; text-align: center;
            border: 1px solid var(--border);
            animation: slideUp .6s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-mark { font-size: 3.5rem; margin-bottom: 24px; animation: spin 2.5s ease infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0); } 50% { transform: rotate(180deg); } 100% { transform: rotate(360deg); } }

        .title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; }
        .subtitle { color: var(--muted); line-height: 1.6; margin-bottom: 32px; font-size: 1.1rem; }

        .email-display {
            background: var(--bloom-pale); color: var(--bloom-pink);
            padding: 12px 20px; border-radius: 16px; display: inline-block;
            font-weight: 700; margin-bottom: 32px; font-size: 1rem;
        }

        .btn-check {
            width: 100%; background: var(--bloom-pink); color: white; border: none;
            padding: 18px; border-radius: 18px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 8px 20px rgba(240, 98, 146, 0.25);
            transition: all .3s; margin-bottom: 16px;
        }
        .btn-check:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(240, 98, 146, 0.35); }

        .btn-resend {
            background: transparent; color: var(--muted); border: 1px solid var(--border);
            padding: 14px 24px; border-radius: 16px; font-size: .95rem; font-weight: 600;
            cursor: pointer; transition: all .2s;
        }
        .btn-resend:hover { background: var(--bloom-pale); color: var(--bloom-pink); border-color: var(--bloom-pink); }

        .back-link { display: block; margin-top: 32px; color: var(--muted); text-decoration: none; font-size: .9rem; font-weight: 500; transition: color .2s; }
        .back-link:hover { color: var(--bloom-pink); }
    </style>
    
    
    
    
    

    <!-- App Icons and Favicon -->
    <link rel="icon" href="NewLuna_Logo_Transparent.svg" type="image/svg+xml">
    <meta property="og:image" content="NewLuna_Logo_Light.svg">
    <meta name="twitter:image" content="NewLuna_Logo_Light.svg">
</head>
<body>

<div class="auth-card">
    <div class="logo-mark">â‹</div>
    <h1 class="title">NewLuna</h1>
    <p class="subtitle">A verification link has been sent to your email. Please click the link to secure your data and finish setting up your account.</p>

    <div class="email-display" id="displayEmail">loading...</div>

    <button class="btn-check" onclick="checkVerification()">I've Verified My Email</button>
    <button class="btn-resend" onclick="resendEmail()">Resend Verification Email</button>

    <a href="login.html" class="back-link">Return to Login</a>
</div>

<script>
    const email = localStorage.getItem('pendingVerifyEmail') || 'your email';
    document.getElementById('displayEmail').textContent = email;

    async function checkVerification() {
        // Must reload the user to see verified status
        const user = firebase.auth().currentUser;
        if (user) {
            await user.reload();
            if (user.emailVerified) {
                alert('Email verified! Redirecting to dashboard...');
                const layout = localStorage.getItem('current_layout') || 'soft';
                window.location.replace(layout === 'roma' ? 'dashboard.html' : 'soft_dashboard.html');
            } else {
                alert('It looks like your email is not verified yet. Please check your inbox and click the link.');
            }
        } else {
            // If session expired, redirect to login
            window.location.replace('login.html');
        }
    }

    async function resendEmail() {
        const user = firebase.auth().currentUser;
        if (user) {
            try {
                await user.sendEmailVerification();
                alert('Verification email resent! Please check your spam folder too.');
            } catch (error) {
                alert(error.message);
            }
        }
    }
</script>

</body>
</html>
