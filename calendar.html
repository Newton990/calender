<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NewLuna - Calendar</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #1c1c2e);
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
}

.sidebar h2 {
  color: #ff4d6d;
}

.nav-item {
  cursor: pointer;
  padding: 8px 0;
  margin: 15px 0;
  opacity: 0.8;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.nav-item:hover {
  background: rgba(255,73,109,0.2);
}

.nav-item.active {
  background: rgba(255,73,109,0.3);
  font-weight: 600;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

.card h3 {
  margin-top: 0;
  color: #ff4d6d;
}

/* CALENDAR */
.calendar-container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.calendar-header h2 {
  margin: 0;
  color: #ff4d6d;
}

.calendar-header button {
  background: rgba(255,77,109,0.3);
  border: 1px solid rgba(255,77,109,0.5);
  color: white;
  padding: 8px 15px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.calendar-header button:hover {
  background: rgba(255,77,109,0.5);
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 10px;
}

.weekday {
  text-align: center;
  padding: 10px;
  font-weight: 600;
  color: #ff4d6d;
  opacity: 0.7;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
  border: 2px solid transparent;
}

.day:hover {
  border-color: rgba(255,77,109,0.5);
}

.day.period {
  background: rgba(255,77,109,0.6);
  color: white;
}

.day.fertile {
  background: rgba(144,202,102,0.5);
  color: white;
}

.day.ovulation {
  background: rgba(255,193,7,0.5);
  color: white;
}

.day.other-month {
  opacity: 0.3;
}

.day.today {
  border-color: #ff4d6d;
  border-width: 2px;
}

.day.has-entry {
  position: relative;
}

.day.has-entry::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  background: #ff4d6d;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255,77,109,0.8);
}

.legend {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.legend-color {
  width: 30px;
  height: 30px;
  border-radius: 8px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    display: flex;
    justify-content: space-around;
  }

  .weekdays, .days {
    gap: 2px;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>NewLuna</h2>
    <div class="nav-item" data-page="dashboard">🏠 Dashboard</div>
    <div class="nav-item active" data-page="calendar">📅 Calendar</div>
    <div class="nav-item" data-page="partner">❤️ Partner</div>
    <div class="nav-item" data-page="profile">👤 Profile</div>
    <div class="nav-item" data-page="settings">⚙️ Settings</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CALENDAR -->
    <div class="calendar-container">
      <div class="calendar-header">
        <h2 id="monthYear">April 2026</h2>
        <div>
          <button id="prevMonth">← Prev</button>
          <button id="nextMonth" style="margin-left: 10px;">Next →</button>
        </div>
      </div>

      <div class="weekdays">
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
      </div>

      <div class="days" id="calendarDays"></div>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-color" style="background: rgba(255,77,109,0.6);"></div>
          <span>Period</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: rgba(255,193,7,0.5);"></div>
          <span>Ovulation</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: rgba(144,202,102,0.5);"></div>
          <span>Fertile</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: transparent; border: 2px solid #ff4d6d; border-radius: 50%; position: relative;">
            <div style="position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #ff4d6d; border-radius: 50%;"></div>
          </div>
          <span>Has Entry</span>
        </div>
      </div>
    </div>

    <!-- CYCLE STATS -->
    <div class="card">
      <h3>Cycle Information</h3>
      <p><strong>Last Period:</strong> <span id="lastPeriod">Not logged</span></p>
      <p><strong>Average Cycle Length:</strong> <span id="avgCycle">28 days</span></p>
      <p><strong>Period Duration:</strong> <span id="periodDuration">5 days</span></p>
      <p><strong>Next Period:</strong> <span id="nextPeriod">May 1</span></p>
      <p><strong>Days Until:</strong> <span id="daysUntil">30 days</span></p>
    </div>

  </div>

</div>

<script>
let currentDate = new Date();
let state = {
  cycleDay: 12,
  periodDate: null,
  settings: {
    avgCycleLength: 28,
    periodDuration: 5
  }
};
let trackingEntries = {};

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  loadTrackingData();
  setupNavigation();
  renderCalendar();
  updateCycleInfo();
  setupCalendarButtons();
});

function setupNavigation() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      if (page === 'dashboard') {
        window.location.href = 'premium.html';
      } else if (page === 'partner') {
        window.location.href = 'partner.html';
      } else if (page === 'profile') {
        window.location.href = 'profile.html';
      } else if (page === 'tracking') {
        window.location.href = 'tracking.html';
      } else if (page === 'settings') {
        window.location.href = 'premium.html';
      }
    });
  });
}

function setupCalendarButtons() {
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  });
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  document.getElementById('monthYear').textContent = 
    currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const prevLastDay = new Date(year, month, 0);
  
  const firstDayOfWeek = firstDay.getDay();
  const lastDateOfMonth = lastDay.getDate();
  const lastDayOfWeek = lastDay.getDay();
  const prevLastDate = prevLastDay.getDate();

  let html = '';

  // Previous month days
  for (let i = firstDayOfWeek; i > 0; i--) {
    html += `<div class="day other-month">${prevLastDate - i + 1}</div>`;
  }

  // Current month days
  for (let date = 1; date <= lastDateOfMonth; date++) {
    const dayDate = new Date(year, month, date);
    const dateStr = dayDate.toISOString().split('T')[0];
    const today = new Date().toISOString().split('T')[0];
    
    let classes = 'day';
    if (dateStr === today) classes += ' today';
    
    // Mark period days (simplified)
    if (state.periodDate) {
      const periodStart = new Date(state.periodDate);
      const periodEnd = new Date(periodStart);
      periodEnd.setDate(periodEnd.getDate() + state.settings.periodDuration);
      
      if (dayDate >= periodStart && dayDate < periodEnd) {
        classes += ' period';
      }
      
      // Mark ovulation
      const nextCycleStart = new Date(periodStart);
      nextCycleStart.setDate(nextCycleStart.getDate() + state.settings.avgCycleLength);
      const ovulationDay = new Date(nextCycleStart);
      ovulationDay.setDate(ovulationDay.getDate() - 14);
      
      const ovulationDateStr = ovulationDay.toISOString().split('T')[0];
      if (dateStr === ovulationDateStr) {
        classes += ' ovulation';
      }
      
      // Mark fertile window
      const fertileStart = new Date(ovulationDay);
      fertileStart.setDate(fertileStart.getDate() - 5);
      const fertileEnd = new Date(ovulationDay);
      fertileEnd.setDate(fertileEnd.getDate() + 1);
      
      if (dayDate >= fertileStart && dayDate < fertileEnd && dateStr !== ovulationDateStr) {
        classes += ' fertile';
      }
    }
    
    // Check if this date has a tracking entry
    if (trackingEntries[dateStr]) {
      classes += ' has-entry';
    }
    
    html += `<div class="${classes}" data-date="${dateStr}">${date}</div>`;
  }

  // Next month days
  for (let date = 1; date <= (7 - lastDayOfWeek - 1); date++) {
    html += `<div class="day other-month">${date}</div>`;
  }

  document.getElementById('calendarDays').innerHTML = html;
  
  // Setup click handlers for dates with entries
  document.querySelectorAll('.day.has-entry').forEach(day => {
    day.addEventListener('click', () => {
      const date = day.dataset.date;
      window.location.href = `tracking.html?date=${date}`;
    });
  });
}

function updateCycleInfo() {
  if (state.periodDate) {
    document.getElementById('lastPeriod').textContent = new Date(state.periodDate).toLocaleDateString();
    
    const nextPeriod = new Date(state.periodDate);
    nextPeriod.setDate(nextPeriod.getDate() + state.settings.avgCycleLength);
    
    document.getElementById('nextPeriod').textContent = nextPeriod.toLocaleDateString();
    
    const today = new Date();
    const daysUntil = Math.ceil((nextPeriod - today) / (1000 * 60 * 60 * 24));
    document.getElementById('daysUntil').textContent = daysUntil > 0 ? `${daysUntil} days` : 'Today!';
  }
  
  document.getElementById('avgCycle').textContent = `${state.settings.avgCycleLength} days`;
  document.getElementById('periodDuration').textContent = `${state.settings.periodDuration} days`;
}

function loadState() {
  const saved = localStorage.getItem('lunaState');
  if (saved) {
    state = { ...state, ...JSON.parse(saved) };
  }
}

function loadTrackingData() {
  const saved = localStorage.getItem('lunaTrackingState');
  if (saved) {
    const trackingState = JSON.parse(saved);
    trackingEntries = trackingState.entries || {};
  }
}
</script>

</body>
</html>
