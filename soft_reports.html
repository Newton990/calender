<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Insights | Luna Soft</title>
    <link rel="stylesheet" href="css/soft-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FDF7F9;
            color: #2D3142;
        }

        .reports-header {
            padding: 40px 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 24px 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 20px 10px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--soft-pink);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #888;
        }

        .chart-section {
            padding: 0 24px 32px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .chart-bar-container {
            margin-bottom: 20px;
        }

        .chart-bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        .chart-bar-track {
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .chart-bar-fill {
            height: 100%;
            background: var(--soft-pink-gradient);
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .section-title {
            font-family: 'Outfit';
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 4px;
        }

        .mood-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px;
            scrollbar-width: none;
        }

        .mood-box {
            min-width: 140px;
            background: white;
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 72px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .nav-item {
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A0A0A0;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--soft-pink);
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body>
    <!-- Animated Splash Screen -->
    <div class="splash-overlay">
        <div class="splash-icon">❋</div>
        <div class="splash-luna">NewLuna</div>
    </div>

    <div class="reports-header">
        <div>
            <div class="glass-pill" style="background: rgba(240, 98, 146, 0.1); color: var(--soft-pink); margin-bottom: 8px;">
                <span style="color: var(--soft-pink); margin-right: 6px;">●</span> Health Analysis
            </div>
            <h1 style="font-family: 'Outfit'; font-size: 32px; font-weight: 700; margin: 0;">Wellness Insights 📊</h1>
        </div>
        <div class="nav-item" onclick="window.print()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2D3142" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">28</div>
            <div class="stat-label">Avg Cycle</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">85%</div>
            <div class="stat-label">Stability</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">12</div>
            <div class="stat-label">Cycles</div>
        </div>
    </div>

    <div class="chart-section">
        <h2 class="section-title">Symptom Trends 🔥</h2>
        <div class="chart-card" id="symptomChart">
            <div class="chart-bar-container">
                <div class="chart-bar-header">
                    <span>Mood Swings</span>
                    <span style="color: #888;">80%</span>
                </div>
                <div class="chart-bar-track">
                    <div class="chart-bar-fill" style="width: 80%;"></div>
                </div>
            </div>
            <div class="chart-bar-container">
                <div class="chart-bar-header">
                    <span>Fatigue</span>
                    <span style="color: #888;">65%</span>
                </div>
                <div class="chart-bar-track">
                    <div class="chart-bar-fill" style="width: 65%;"></div>
                </div>
            </div>
            <div class="chart-bar-container">
                <div class="chart-bar-header">
                    <span>Cramps</span>
                    <span style="color: #888;">40%</span>
                </div>
                <div class="chart-bar-track">
                    <div class="chart-bar-fill" style="width: 40%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-section" style="padding-bottom: 120px;">
        <h2 class="section-title">Mood Phase Analysis 🎭</h2>
        <div class="mood-row">
            <div class="mood-box">
                <div style="font-size: 10px; font-weight: 700; color: #888; margin-bottom: 4px;">MENSTRUAL</div>
                <div style="font-size: 16px; font-weight: 700; color: #FFB3C1;">🍫 Calm</div>
            </div>
            <div class="mood-box">
                <div style="font-size: 10px; font-weight: 700; color: #888; margin-bottom: 4px;">FOLLICULAR</div>
                <div style="font-size: 16px; font-weight: 700; color: #F06292;">❋ Energetic</div>
            </div>
            <div class="mood-box">
                <div style="font-size: 10px; font-weight: 700; color: #888; margin-bottom: 4px;">OVULATORY</div>
                <div style="font-size: 16px; font-weight: 700; color: #FFA000;">🔥 Radiant</div>
            </div>
            <div class="mood-box">
                <div style="font-size: 10px; font-weight: 700; color: #888; margin-bottom: 4px;">LUTEAL</div>
                <div style="font-size: 16px; font-weight: 700; color: #4DB6AC;">☁️ Sensitive</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='soft_dashboard.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        <div class="nav-item" onclick="location.href='soft_assistant.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </nav>

    <script src="js/soft_reports.js"></script>
</body>
</html>
