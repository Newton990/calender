<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLuna | Calendar</title>
    <meta name="description" content="NewLuna — Your premium cycle tracking and wellness companion.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <style>
        :root {
            --bloom-pink: #f06292;
            --bloom-light: #f8a5c2;
            --bloom-pale: #fce4ec;
            --bloom-teal: #4db6ac;
            --bloom-sage: #a5d6a7;
            --bg: #f9eef3;
            --card: #ffffff;
            --text: #3d2c35;
            --muted: #9e7d8a;
            --border: rgba(240, 98, 146, 0.12);
            --sidebar-w: 270px;
            --shadow-soft: 0 8px 32px rgba(240, 98, 146, 0.10);
            --shadow-hover: 0 16px 48px rgba(240, 98, 146, 0.18);
            --radius: 24px;
            --radius-sm: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── LAYOUT ── */
        .app-shell { display: flex; min-height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, #f06292 0%, #ce4993 60%, #a83283 100%);
            padding: 40px 28px;
            display: flex; flex-direction: column;
            position: sticky; top: 0; height: 100vh;
            box-shadow: 4px 0 24px rgba(206,73,147,.18);
            z-index: 100;
        }
        .sidebar-brand {
            display: flex; align-items: center; gap: 12px; margin-bottom: 48px;
        }
        .brand-flower { font-size: 2rem; }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem; font-weight: 700; color: white;
            letter-spacing: -.5px; line-height: 1.2;
        }
        .brand-name span { font-weight: 400; font-size: 1rem; opacity: .8; display: block; }

        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-link {
            display: flex; align-items: center; gap: 14px;
            padding: 13px 16px; border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.82); font-size: 1rem; font-weight: 500;
            text-decoration: none; transition: all .25s ease;
            cursor: pointer;
        }
        .nav-link:hover { background: rgba(255,255,255,.15); color: white; transform: translateX(4px); }
        .nav-link.active { background: rgba(255,255,255,.22); color: white; font-weight: 600; }
        .nav-link .nav-icon { font-size: 1.25rem; width: 28px; text-align: center; }

        .sidebar-footer {
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,.2);
            font-size: .82rem; opacity: .65; color: white;
            line-height: 1.6;
        }
        .sidebar-user {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }
        .sidebar-avatar {
            width: 38px; height: 38px; border-radius: 12px;
            background: rgba(255,255,255,.25); display: flex;
            align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; color: white;
        }
        .sidebar-user-info .name { font-size: .9rem; font-weight: 600; color: white; }

        /* ── MAIN ── */
        .main {
            flex: 1; padding: 40px 36px;
            overflow-y: auto; overflow-x: hidden;
            max-height: 100vh;
        }

        /* ── HEADER ── */
        .top-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 36px;
        }
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; font-weight: 700; color: var(--text);
        }

        /* ── CALENDAR ── */
        .calendar-card {
            background: var(--card); border-radius: var(--radius);
            padding: 32px; box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
        }
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .month-display {
            font-size: 1.5rem; font-weight: 700; color: var(--bloom-pink);
        }
        .cal-nav { display: flex; gap: 12px; }
        .cal-nav button {
            background: var(--bloom-pale); border: none; width: 44px; height: 44px;
            border-radius: 12px; cursor: pointer; color: var(--bloom-pink);
            font-size: 1.2rem; font-weight: 700; transition: all .2s;
        }
        .cal-nav button:hover { background: #f8d0de; transform: scale(1.05); }

        .weekdays-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
            margin-bottom: 15px; text-align: center;
        }
        .weekday-label {
            font-size: .85rem; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.2px; padding: 10px;
        }

        .days-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
        }
        .day-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 16px; font-size: 1rem; font-weight: 500;
            cursor: pointer; transition: all .2s; border: 2px solid transparent;
            position: relative;
        }
        .day-cell:hover { background: var(--bloom-pale); transform: translateY(-2px); }
        .day-cell.today { border-color: var(--bloom-pink); font-weight: 700; color: var(--bloom-pink); }
        .day-cell.other-month { opacity: .3; cursor: default; }
        .day-cell.other-month:hover { background: transparent; transform: none; }
        
        .day-cell.period { background: var(--bloom-pink); color: white; border-radius: 50%; }
        .day-cell.fertile { background: rgba(77,182,172,0.15); border: 1.5px dashed var(--bloom-teal); }
        .day-cell.ovulation { background: var(--bloom-teal); color: white; border-radius: 50%; }

        .entry-dot {
            position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; border-radius: 50%; background: var(--bloom-pink);
        }

        /* ── LEGEND ── */
        .legend {
            display: flex; gap: 24px; margin-top: 32px; padding-top: 24px;
            border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: .9rem; color: var(--muted); }
        .dot-icon { width: 14px; height: 14px; border-radius: 4px; }

        /* ── STATS ── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        .stat-box {
            background: var(--card); border-radius: var(--radius-sm);
            padding: 24px; border: 1px solid var(--border);
            text-align: center;
        }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--bloom-pink); display: block; }
        .stat-lbl { font-size: .8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 6px; }

        /* ── ANIMATIONS ── */
        .fade-in { animation: fadeUp .6s ease both; }
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(16px); }
            to   { opacity:1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .app-shell { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; flex-direction: row; }
            .sidebar-nav { flex-direction: row; }
            .nav-link span:not(.nav-icon) { display: none; }
            .sidebar-footer, .sidebar-user { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-flower">❋</div>
            <div class="brand-name">NewLuna</div>
        </div>
        <nav class="sidebar-nav">
            <a href="soft_dashboard.html" class="nav-link">
                <span class="nav-icon">🏠</span> <span>Dashboard</span>
            </a>
            <a href="soft_calendar.html" class="nav-link active">
                <span class="nav-icon">📅</span> <span>Calendar</span>
            </a>
            <a href="soft_reports.html" class="nav-link">
                <span class="nav-icon">📊</span> <span>Reports</span>
            </a>
            <a href="soft_profile.html" class="nav-link">
                <span class="nav-icon">👤</span> <span>Profile</span>
            </a>
            <a href="settings.html" class="nav-link">
                <span class="nav-icon">⚙️</span> <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">NewLuna v2.1</div>
    </aside>

    <main class="main">
        <header class="top-header fade-in">
            <h1 class="page-title">Your Cycle Calendar</h1>
        </header>

        <div class="calendar-card fade-in">
            <div class="calendar-header">
                <div class="month-display" id="monthYear">April 2026</div>
                <div class="cal-nav">
                    <button id="prevMonth">‹</button>
                    <button id="nextMonth">›</button>
                </div>
            </div>

            <div class="weekdays-grid">
                <div class="weekday-label">Sun</div>
                <div class="weekday-label">Mon</div>
                <div class="weekday-label">Tue</div>
                <div class="weekday-label">Wed</div>
                <div class="weekday-label">Thu</div>
                <div class="weekday-label">Fri</div>
                <div class="weekday-label">Sat</div>
            </div>

            <div class="days-grid" id="calendarDays"></div>

            <div class="legend">
                <div class="legend-item"><div class="dot-icon" style="background: var(--bloom-pink)"></div> Period</div>
                <div class="legend-item"><div class="dot-icon" style="background: var(--bloom-teal)"></div> Ovulation</div>
                <div class="legend-item"><div class="dot-icon" style="background: rgba(77,182,172,0.2); border: 1.5px dashed var(--bloom-teal)"></div> Fertile Window</div>
                <div class="legend-item"><div class="dot-icon" style="background: var(--bloom-pale); border: 2px solid var(--bloom-pink)"></div> Today</div>
            </div>
        </div>

        <div class="stats-grid fade-in" style="animation-delay: 0.2s">
            <div class="stat-box">
                <span class="stat-val" id="avgCycle">28</span>
                <span class="stat-lbl">Avg Cycle Length</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="nextPeriodIn">24</span>
                <span class="stat-lbl">Days Until Next Period</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="lastPeriodDate">Apr 4</span>
                <span class="stat-lbl">Last Period Started</span>
            </div>
        </div>
    </main>
</div>

<script src="js/common.js"></script>
<script>
    let currentDate = new Date();
    let state = {
        cycleDay: 1,
        periodDate: null,
        settings: { avgCycleLength: 28, periodDuration: 5 }
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadState();
        renderCalendar();
        setupNav();
        updateStats();
    });

    function loadState() {
        const saved = localStorage.getItem('lunaState');
        if (saved) state = { ...state, ...JSON.parse(saved) };
    }

    function setupNav() {
        document.getElementById('prevMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };
        document.getElementById('nextMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        document.getElementById('monthYear').textContent = 
            currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDaysInMonth = new Date(year, month, 0).getDate();
        
        let html = '';

        // Prev month padding
        for (let i = firstDay; i > 0; i--) {
            html += `<div class="day-cell other-month">${prevDaysInMonth - i + 1}</div>`;
        }

        // Current month
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const dateStr = dateObj.toISOString().split('T')[0];
            const todayStr = new Date().toISOString().split('T')[0];
            
            let classes = 'day-cell';
            if (dateStr === todayStr) classes += ' today';
            
            // Period Logic
            if (state.periodDate) {
                const pStart = new Date(state.periodDate);
                const pEnd = new Date(pStart);
                pEnd.setDate(pEnd.getDate() + state.settings.periodDuration);
                
                if (dateObj >= pStart && dateObj < pEnd) classes += ' period';
                
                // Ovulation (simplified: 14 days before next cycle)
                const nextCycle = new Date(pStart);
                nextCycle.setDate(nextCycle.getDate() + state.settings.avgCycleLength);
                const ovul = new Date(nextCycle);
                ovul.setDate(ovul.getDate() - 14);
                
                if (dateStr === ovul.toISOString().split('T')[0]) classes += ' ovulation';
                
                // Fertile
                const fStart = new Date(ovul); fStart.setDate(fStart.getDate() - 5);
                const fEnd = new Date(ovul); fEnd.setDate(fEnd.getDate() + 1);
                if (dateObj >= fStart && dateObj < fEnd && dateStr !== ovul.toISOString().split('T')[0]) classes += ' fertile';
            }

            html += `<div class="${classes}" onclick="location.href='soft_tracking.html?date=${dateStr}'">${d}</div>`;
        }

        document.getElementById('calendarDays').innerHTML = html;
    }

    function updateStats() {
        document.getElementById('avgCycle').textContent = state.settings.avgCycleLength;
        if (state.periodDate) {
            const last = new Date(state.periodDate);
            document.getElementById('lastPeriodDate').textContent = last.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            const next = new Date(last);
            next.setDate(next.getDate() + state.settings.avgCycleLength);
            const diff = Math.ceil((next - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('nextPeriodIn').textContent = diff > 0 ? diff : 'Soon';
        }
    }
</script>

</body>
</html>
